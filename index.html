<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulado de Eletricidade Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #eef2f3; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; transition: 0.3s; }
        h1 { color: #2c3e50; text-align: center; }
        .question { font-weight: bold; margin-bottom: 12px; color: #2c3e50; font-size: 1.1em; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
        .correct-highlight { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; font-weight: bold; }
        .wrong-highlight { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }
        button { background: #3498db; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 18px; display: block; margin: 30px auto; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        #resultado { display: none; text-align: center; font-size: 22px; margin-top: 20px; padding: 30px; border-radius: 12px; }
        .status-msg { font-size: 16px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>Simulado: Corrente Alternada ⚡</h1>
    <div id="quiz-container"></div>
    <button id="btn-finalizar" onclick="corrigirProva()">Finalizar e Ver Erros</button>
    <div id="resultado"></div>

    <script>
        const perguntas = [
            { q: "Se o período (T) de uma onda é 20ms, qual a frequência (f)?", options: ["50Hz", "60Hz", "100Hz", "20Hz"], correct: 0 },
            { q: "Qual a fórmula correta para a Velocidade Angular (ω)?", options: ["ω = 2 + π + f", "ω = 2 * π * f", "ω = Vp / T", "ω = f / T"], correct: 1 },
            { q: "Uma onda completa um ciclo em 0,1s. Qual o seu período?", options: ["10ms", "100ms", "1000ms", "0,1ms"], correct: 1 },
            { q: "Se Vp é 100V, qual o valor aproximado de Vrms?", options: ["50V", "141V", "70,7V", "100V"], correct: 2 },
            { q: "O que acontece com a frequência se o período (T) aumentar?", options: ["A frequência aumenta", "A frequência diminui", "A frequência não muda", "O Vp diminui"], correct: 1 },
            { q: "Calcule ω para uma frequência de 60Hz (use π = 3,14).", options: ["120 rad/s", "376,8 rad/s", "188,4 rad/s", "60 rad/s"], correct: 1 },
            { q: "Em um gráfico, a distância vertical do zero até o topo da onda é:", options: ["Vrms", "Vpp", "Vp (Pico)", "Período"], correct: 2 },
            { q: "Se T = 80ms, qual a frequência?", options: ["12,5Hz", "25Hz", "8Hz", "125Hz"], correct: 0 },
            { q: "Qual o valor de Vp se Vrms é 127V?", options: ["127V", "100V", "179,6V", "220V"], correct: 2 },
            { q: "A unidade de medida da Velocidade Angular (ω) é:", options: ["Hertz (Hz)", "Segundos (s)", "Volts (V)", "Radianos por segundo (rad/s)"], correct: 3 }
        ];

        const container = document.getElementById('quiz-container');
        perguntas.forEach((item, index) => {
            let html = `<div class="card" id="card-${index}">
                <div class="question">${index + 1}. ${item.q}</div>
                <ul class="options" id="options-${index}">`;
            item.options.forEach((opt, i) => {
                html += `<li id="q${index}-opt${i}">
                    <input type="radio" name="q${index}" value="${i}"> ${opt}
                </li>`;
            });
            html += `</ul></div>`;
            container.innerHTML += html;
        });

        function corrigirProva() {
            let nota = 0;
            const btn = document.getElementById('btn-finalizar');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            perguntas.forEach((item, index) => {
                const radios = document.getElementsByName(`q${index}`);
                const selecionada = document.querySelector(`input[name="q${index}"]:checked`);
                const correctLi = document.getElementById(`q${index}-opt${item.correct}`);
                
                // Desabilitar todos os inputs após finalizar
                radios.forEach(r => r.disabled = true);

                if (selecionada) {
                    const valorApertado = parseInt(selecionada.value);
                    if (valorApertado === item.correct) {
                        nota++;
                        correctLi.classList.add('correct-highlight');
                    } else {
                        const wrongLi = document.getElementById(`q${index}-opt${valorApertado}`);
                        wrongLi.classList.add('wrong-highlight');
                        correctLi.classList.add('correct-highlight'); // Mostra a certa mesmo errando
                    }
                } else {
                    // Se não marcou nada, só mostra a correta
                    correctLi.classList.add('correct-highlight');
                }
            });

            const resDiv = document.getElementById('resultado');
            resDiv.style.display = 'block';
            let msg = nota >= 7 ? "Excelente! Domínio total. 🚀" : "Revise os pontos em vermelho! 📚";
            resDiv.innerHTML = `Nota Final: ${nota} / 10 <span class="status-msg">${msg}</span>`;
            resDiv.style.backgroundColor = nota >= 7 ? "#d4edda" : "#f8d7da";
            resDiv.style.color = nota >= 7 ? "#155724" : "#721c24";

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
